name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Version from tag
      id: ver
      shell: bash
      run: |
        TAG="${GITHUB_REF_NAME}"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Agent (single-file)
      run: >
        dotnet publish src/Behavedr.Agent/Behavedr.Agent.csproj
        -c Release
        -r ${{ matrix.rid }}
        --self-contained
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:EnableCompressionInSingleFile=true
        -p:DebugType=none
        -p:DebugSymbols=false
        -p:Version=${{ steps.ver.outputs.version }}
        -o publish/agent-${{ matrix.rid }}

    - name: Stage portable package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $rid = '${{ matrix.rid }}'
        $ver = '${{ steps.ver.outputs.version }}'
        $src = "publish/agent-$rid"
        $stage = "dist/portable-$rid"
        New-Item -ItemType Directory -Force -Path $stage | Out-Null
        Copy-Item "$src/Behavedr.exe" $stage
        if (Test-Path "$src/Assets") { Copy-Item "$src/Assets" $stage -Recurse -Force }
        Copy-Item packaging/windows/README.txt $stage
        Compress-Archive -Path "$stage/*" -DestinationPath "Behavedr-Portable-$ver-$rid.zip" -Force
        Get-ChildItem $stage | Format-Table Name, Length

    - name: Build Windows installer (Inno Setup)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install innosetup -y --no-progress
        $iscc = @(
          "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
          "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
        ) | Where-Object { Test-Path $_ } | Select-Object -First 1
        if (-not $iscc) { throw "ISCC.exe not found after Inno Setup install" }
        New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
        Copy-Item packaging/windows/README.txt publish/agent-win-x64/ -Force
        $publish = (Resolve-Path "publish/agent-win-x64").Path
        $outDir = Join-Path (Get-Location) "dist\windows"
        New-Item -ItemType Directory -Force -Path $outDir | Out-Null
        & $iscc "packaging\windows\behavedr.iss" `
          "/DMyAppVersion=${{ steps.ver.outputs.version }}" `
          "/DPublishDir=$publish" `
          "/DOutputDir=$outDir"
        if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed: $LASTEXITCODE" }
        Get-ChildItem dist/windows

    - name: Stage portable package (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -e
        RID="${{ matrix.rid }}"
        VER="${{ steps.ver.outputs.version }}"
        SRC="publish/agent-${RID}"
        STAGE="dist/portable-${RID}"
        mkdir -p "$STAGE"
        cp "$SRC/Behavedr" "$STAGE/"
        chmod +x "$STAGE/Behavedr"
        [ -d "$SRC/Assets" ] && cp -r "$SRC/Assets" "$STAGE/" || true
        cp packaging/unix/README.txt "$STAGE/"
        (cd "$STAGE" && zip -r "../../Behavedr-Portable-${VER}-${RID}.zip" .)
        ls -la "$STAGE"

    - name: Upload desktop artifacts
      uses: actions/upload-artifact@v4
      with:
        name: agent-${{ matrix.rid }}
        path: |
          Behavedr-Portable-*.zip
          dist/windows/Behavedr-Setup-*.exe
        if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Version from tag
      id: ver
      shell: bash
      run: |
        TAG="${GITHUB_REF_NAME}"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android platform packages
      run: |
        sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
        yes | sdkmanager --licenses || true

    - name: Install MAUI Android workload
      run: dotnet workload install maui-android

    - name: Publish Android
      run: >
        dotnet publish src/Behavedr.Mobile/Behavedr.Mobile.csproj
        -c Release
        -f net10.0-android
        -r android-arm64
        -p:Version=${{ steps.ver.outputs.version }}
        -p:ApplicationDisplayVersion=${{ steps.ver.outputs.version }}
        -o publish/android

    - name: Package Android
      run: |
        mkdir -p dist
        VER="${{ steps.ver.outputs.version }}"
        find publish/android -type f -name '*.apk' -print -exec cp -v {} dist/ \;
        apk=$(find dist -name '*Signed.apk' -o -name '*.apk' | head -1)
        if [ -n "$apk" ]; then
          cp -v "$apk" "dist/Behavedr-${VER}-android.apk"
        else
          echo "No APK produced" && exit 1
        fi
        # Drop redundant intermediate packages from release assets
        find dist -type f ! -name "Behavedr-${VER}-android.apk" -delete
        ls -la dist

    - name: Upload Android artifact
      uses: actions/upload-artifact@v4
      with:
        name: android
        path: dist/*
        if-no-files-found: error

  publish-release:
    name: GitHub Release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Flatten artifacts
      run: |
        mkdir -p release-assets
        find artifacts -type f \( -name '*.zip' -o -name '*.apk' -o -name '*.exe' \) -exec cp -v {} release-assets/ \;
        ls -la release-assets
        test -n "$(ls -A release-assets)"
        # Must include Windows installer
        ls release-assets/Behavedr-Setup-*-win-x64.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Behavedr ${{ github.ref_name }}
        draft: false
        prerelease: false
        make_latest: true
        generate_release_notes: true
        body: |
          ## Behavedr ${{ github.ref_name }}

          ### Windows (recommended)
          | Asset | What to do |
          |-------|------------|
          | **`Behavedr-Setup-*-win-x64.exe`** | **Run the installer** → Program Files, Start Menu, uninstall |
          | `Behavedr-Portable-*-win-x64.zip` | Optional: single `Behavedr.exe`, no install |

          ### Other platforms
          | Asset | Platform |
          |-------|----------|
          | `Behavedr-Portable-*-linux-x64.zip` | Linux x64 — extract, `chmod +x Behavedr`, run |
          | `Behavedr-Portable-*-osx-arm64.zip` | macOS Apple Silicon — extract and run |
          | `Behavedr-*-android.apk` | Android arm64 |

          ### Notes
          - Windows portable/installer use a **single-file** agent (`Behavedr.exe`), not a folder of runtime DLLs.
          - Detection engines are early stubs.
          - No iOS device IPA yet (Apple signing not configured).
        files: release-assets/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
