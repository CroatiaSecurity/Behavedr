name: Build Behavedr

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  desktop:
    name: Desktop (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/Behavedr.Agent/Behavedr.Agent.csproj

    - name: Restore Tests
      run: dotnet restore tests/Behavedr.Tests/Behavedr.Tests.csproj

    - name: Build Core + Agent
      run: |
        dotnet build src/Behavedr.Core/Behavedr.Core.csproj -c Release --no-restore
        dotnet build src/Behavedr.Agent/Behavedr.Agent.csproj -c Release --no-restore

    - name: Build Tests
      run: dotnet build tests/Behavedr.Tests/Behavedr.Tests.csproj -c Release --no-restore

    - name: Run tests
      run: dotnet test tests/Behavedr.Tests/Behavedr.Tests.csproj -c Release --no-build --verbosity normal

    - name: Publish Agent
      run: dotnet publish src/Behavedr.Agent/Behavedr.Agent.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/agent

    - name: Generate SBOM
      if: runner.os == 'Linux'
      run: |
        dotnet tool install --global Microsoft.Sbom.DotNetTool 2>/dev/null || true
        sbom-tool generate -b publish/agent -bc src/Behavedr.Agent -pn Behavedr -pv 0.0.5 -ps CroatiaSecurity -nsb https://github.com/CroatiaSecurity/Behavedr || echo "SBOM generation skipped (tool not available)"

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'

    - name: Setup Java
      uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3.2.2

    - name: Install Android platform packages
      run: |
        sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"
        yes | sdkmanager --licenses || true

    - name: Install MAUI Android workload
      run: dotnet workload install maui-android

    - name: Build Android
      run: dotnet build src/Behavedr.Mobile/Behavedr.Mobile.csproj -c Release -f net10.0-android -r android-arm64

    - name: Publish Android
      run: dotnet publish src/Behavedr.Mobile/Behavedr.Mobile.csproj -c Release -f net10.0-android -r android-arm64 -o publish/android

    - name: Upload Android artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: behavedr-android
        path: publish/android
        if-no-files-found: warn

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'

    - name: Select Xcode for .NET iOS workload
      run: |
        set -e
        echo "Available Xcode apps:"
        ls -d /Applications/Xcode*.app 2>/dev/null || true
        for candidate in \
          /Applications/Xcode_26.6.app \
          /Applications/Xcode_26.6.0.app \
          /Applications/Xcode_26.7.app \
          /Applications/Xcode.app
        do
          if [ -d "$candidate" ]; then
            sudo xcode-select -s "$candidate"
            break
          fi
        done
        if ! xcodebuild -version | head -1 | grep -Eq 'Xcode 26\.(6|7|8|9)'; then
          latest=$(ls -d /Applications/Xcode_26.*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "$latest" ]; then
            sudo xcode-select -s "$latest"
          fi
        fi
        xcodebuild -version
        xcode-select -p

    - name: Install MAUI iOS workload
      run: dotnet workload install maui-ios

    - name: Build iOS (simulator, no codesign)
      run: >
        dotnet build src/Behavedr.Mobile/Behavedr.Mobile.csproj
        -c Release
        -p:MobileTfms=net10.0-ios
        -f net10.0-ios
        -r iossimulator-arm64
        -p:CodesignKey=
        -p:CodesignProvision=
        -p:EnableCodeSigning=false
