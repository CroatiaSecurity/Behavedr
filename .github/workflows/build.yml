name: Build Behavedr

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'

    - name: Restore
      run: dotnet restore src/Behavedr.Agent/Behavedr.Agent.csproj

    - name: Restore Tests
      run: dotnet restore tests/Behavedr.Tests/Behavedr.Tests.csproj

    - name: Build Core + Agent
      run: |
        dotnet build src/Behavedr.Core/Behavedr.Core.csproj -c Release --no-restore
        dotnet build src/Behavedr.Agent/Behavedr.Agent.csproj -c Release --no-restore

    - name: Build Tests
      run: dotnet build tests/Behavedr.Tests/Behavedr.Tests.csproj -c Release --no-restore

    - name: Run tests
      run: dotnet test tests/Behavedr.Tests/Behavedr.Tests.csproj -c Release --no-build --verbosity normal

    - name: Publish Agent
      run: dotnet publish src/Behavedr.Agent/Behavedr.Agent.csproj -c Release -r ${{ matrix.rid }} --self-contained -o publish/agent

    - name: Generate SBOM
      if: runner.os == 'Linux'
      run: |
        dotnet tool install --global Microsoft.Sbom.DotNetTool 2>/dev/null || true
        sbom-tool generate -b publish/agent -bc src/Behavedr.Agent -pn Behavedr -pv 0.0.7 -ps CroatiaSecurity -nsb https://github.com/CroatiaSecurity/Behavedr || echo "SBOM generation skipped (tool not available)"

  android:
    name: Android
    runs-on: ubuntu-latest
    # Mobile builds are best-effort — don't block desktop CI
    continue-on-error: true
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'

    - name: Setup Java
      uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3.2.2

    - name: Install Android platform packages
      run: |
        # Install latest available API level; fall back gracefully
        sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>/dev/null \
          || sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        yes | sdkmanager --licenses || true

    - name: Install MAUI Android workload
      run: dotnet workload install maui-android

    - name: Build Android
      run: dotnet build src/Behavedr.Mobile/Behavedr.Mobile.csproj -c Release -f net10.0-android -r android-arm64

    - name: Publish Android
      run: dotnet publish src/Behavedr.Mobile/Behavedr.Mobile.csproj -c Release -f net10.0-android -r android-arm64 -o publish/android

    - name: Upload Android artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: behavedr-android
        path: publish/android
        if-no-files-found: warn

  ios:
    name: iOS
    runs-on: macos-latest
    # Mobile builds are best-effort — don't block desktop CI
    continue-on-error: true
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Setup .NET
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.3.1
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'ga'

    - name: Select latest Xcode
      run: |
        set -e
        echo "Available Xcode versions:"
        ls -d /Applications/Xcode*.app 2>/dev/null || true
        # Pick the latest Xcode available on the runner
        LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
        if [ -z "$LATEST_XCODE" ]; then
          LATEST_XCODE="/Applications/Xcode.app"
        fi
        echo "Using: $LATEST_XCODE"
        sudo xcode-select -s "$LATEST_XCODE"
        xcodebuild -version
        xcode-select -p

    - name: Install MAUI iOS workload
      run: dotnet workload install maui-ios

    - name: Build iOS (simulator, no codesign)
      run: >
        dotnet build src/Behavedr.Mobile/Behavedr.Mobile.csproj
        -c Release
        -p:MobileTfms=net10.0-ios
        -f net10.0-ios
        -r iossimulator-arm64
        -p:CodesignKey=
        -p:CodesignProvision=
        -p:EnableCodeSigning=false

  auto-tag:
    name: Auto-tag release
    needs: [desktop]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      with:
        fetch-depth: 0

    - name: Read version from Directory.Build.props
      id: version
      shell: bash
      run: |
        VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1)
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Detected version: ${VERSION}"

    - name: Check if tag already exists
      id: check
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG already exists — skipping"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG does not exist — will create"
        fi

    - name: Create and push tag
      if: steps.check.outputs.exists == 'false'
      shell: bash
      run: |
        TAG="${{ steps.version.outputs.tag }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG" -m "Release $TAG"
        git push origin "$TAG"
        echo "✓ Created and pushed tag: $TAG"
